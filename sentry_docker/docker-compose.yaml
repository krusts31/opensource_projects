services:
  postgres:
    image: "postgres:18.1"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
    command:
      ["postgres"]
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_USER: sentry
  redis:
    image: "redis:8.4.0"
    healthcheck:
      test: redis-cli ping | grep PONG
    volumes:
      - type: bind
        read_only: true
        source: ./redis.conf
        target: /usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
  sentry-upgrade:
    image: sentry:latest
    command: ["/bin/sleep", "36000"]
    environment:
      SENTRY_SECRET_KEY: "<secret-key>"
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: secret
      SENTRY_DB_NAME: sentry
      SENTRY_REDIS_HOST: redis
      HEALTH: "false"
      SENTRY_POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "[ -f /health ]"]
      interval: 10s
      timeout: 60s
      retries: 300
  sentry:
    image: sentry:latest
    environment:
      SENTRY_SECRET_KEY: "<secret-key>"
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: secret
      SENTRY_DB_NAME: sentry
      SENTRY_REDIS_HOST: redis
      SENTRY_POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sentry-upgrade:
        condition: service_healthy
    ports:
      - "8080:9000"
  sentry-work:
    image: sentry:latest
    command: ['sentry','run', 'worker']
    environment:
      SENTRY_SECRET_KEY: "<secret-key>"
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: secret
      SENTRY_DB_NAME: sentry
      SENTRY_REDIS_HOST: redis
      SENTRY_POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sentry-upgrade:
        condition: service_healthy
  sentry-cron:
    image: sentry:latest
    command: ['sentry','run', 'cron']
    environment:
      SENTRY_SECRET_KEY: "<secret-key>"
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: secret
      SENTRY_DB_NAME: sentry
      SENTRY_REDIS_HOST: redis
      SENTRY_POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sentry-upgrade:
        condition: service_healthy
